<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferretería Oviedo — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --naranja:#E8450A;--naranja2:#c93a08;--naranja-light:#fff3ee;
  --gris-dark:#1a1a1a;--gris:#4a4a4a;--gris-mid:#888;--gris-light:#f5f5f5;--gris-border:#e0e0e0;
  --blanco:#fff;--verde:#2e7d32;--rojo:#c62828;--azul:#1565c0;
  --radius:14px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,.1);
  --font:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gris-light);color:var(--gris-dark);min-height:100dvh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a1a 0%,#E8450A 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:white;border-radius:20px;padding:40px;width:360px;max-width:90vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-brand{font-size:22px;font-weight:800;color:var(--naranja);margin-bottom:2px;letter-spacing:-0.5px}
.login-sub{font-size:12px;color:var(--gris-mid);margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;border:2px solid var(--gris-border);border-radius:var(--radius-sm);font-size:16px;font-family:var(--font);outline:none;transition:border .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--naranja)}
.login-btn{width:100%;padding:14px;background:var(--naranja);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;font-family:var(--font)}
.login-error{color:var(--rojo);font-size:13px;margin-top:8px;min-height:18px}

/* HEADER */
header{background:white;border-bottom:3px solid var(--naranja);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-title h1{font-size:15px;font-weight:800;color:var(--naranja);line-height:1.1}
.header-title p{font-size:10px;color:var(--gris-mid)}
.header-spacer{flex:1}
.btn-logout{font-size:11px;color:var(--gris-mid);cursor:pointer;padding:6px 10px;border:1px solid var(--gris-border);border-radius:6px;background:white;font-family:var(--font)}

/* SYNC BAR */
.sync-bar{padding:7px 16px;font-size:11px;display:flex;align-items:center;gap:6px}
.sync-bar.ok{background:#e8f5e9;color:#2e7d32}
.sync-bar.warn{background:#fff3e0;color:#e65100}
.sync-bar.loading{background:#e3f2fd;color:#1565c0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PROMOS SECTION */
.promos-section{padding:16px;background:var(--blanco);border-bottom:1px solid var(--gris-border);display:none;}
.promos-title{font-size:14px;font-weight:800;color:var(--naranja);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.promos-container{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.promos-container::-webkit-scrollbar{display:none;}
.promo-card{min-width:260px;background:linear-gradient(135deg,#E8450A,#ff6b35);color:white;border-radius:12px;padding:14px;flex-shrink:0;box-shadow:0 4px 12px rgba(232,69,10,0.2);}
.promo-tag{background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-bottom:6px;display:inline-block;}
.promo-name{font-size:15px;font-weight:800;margin-bottom:4px;}
.promo-desc{font-size:12px;opacity:0.9;margin-bottom:8px;}
.promo-price{font-size:18px;font-weight:800;}

/* SEARCH */
.search-section{padding:10px 14px;background:white;border-bottom:1px solid var(--gris-border)}
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{width:100%;padding:11px 16px 11px 40px;border:2px solid var(--gris-border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font);outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--naranja)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px}
.filters{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{height:0}
.filter-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--gris-border);font-size:11px;background:white;cursor:pointer;color:var(--gris);font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:all .15s}
.filter-btn.active{background:var(--naranja);border-color:var(--naranja);color:white;font-weight:600}

/* PRODUCTOS */
.productos-list{padding:8px 14px;display:flex;flex-direction:column;gap:8px;max-width:700px;margin:0 auto;padding-bottom:90px}
.prod-card{background:white;border-radius:var(--radius);box-shadow:0 1px 5px rgba(0,0,0,.05);overflow:hidden}
.prod-header{padding:12px 14px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.prod-nombre{font-size:13px;font-weight:600;color:var(--gris-dark);line-height:1.35;flex:1}
.prod-codigo{font-size:10px;color:var(--gris-mid);background:var(--gris-light);padding:3px 7px;border-radius:6px;white-space:nowrap}
.prod-marca{font-size:11px;color:var(--azul);font-weight:500;padding:0 14px 6px}
.prod-bottom{padding:6px 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.precio-publico{background:var(--naranja-light);border-radius:8px;padding:8px 14px;display:flex;flex-direction:column;align-items:center}
.precio-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--naranja);margin-bottom:1px}
.precio-val{font-size:18px;font-weight:800;color:var(--naranja)}
.qty-wrap{display:flex;align-items:center;gap:3px;background:var(--gris-light);border-radius:8px;padding:3px 6px}
.qty-btn{width:26px;height:26px;border:none;background:var(--naranja);color:white;border-radius:5px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.qty-val{width:30px;text-align:center;font-size:15px;font-weight:700}
.btn-add{padding:9px 16px;background:var(--naranja);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}

/* CARRITO FAB */
.cart-fab{position:fixed;bottom:20px;right:20px;width:58px;height:58px;background:var(--naranja);color:white;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(232,69,10,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.cart-badge{position:absolute;top:-3px;right:-3px;background:var(--rojo);color:white;border-radius:50%;width:20px;height:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* PANEL CARRITO */
.cart-panel{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none}
.cart-drawer{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;max-height:92dvh;overflow-y:auto;padding:16px}
.cart-handle{width:36px;height:4px;background:var(--gris-border);border-radius:2px;margin:0 auto 14px}
.cart-title{font-size:19px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cart-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--gris-border)}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:600;line-height:1.3}
.cart-item-codigo{font-size:10px;color:var(--gris-mid);margin-top:1px}
.cart-item-price{font-size:14px;font-weight:700;color:var(--naranja);white-space:nowrap}
.btn-remove{color:var(--rojo);font-size:18px;cursor:pointer;padding:4px;background:none;border:none}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:12px;font-size:18px;font-weight:800;background:var(--naranja);color:white;border-radius:10px;margin:16px 0}
.btn-send{width:100%;padding:14px;background:var(--verde);color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.btn-pdf{width:100%;padding:12px;background:var(--azul);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);margin-bottom:8px}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transition:.3s;opacity:0;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--verde)}
#toast.err{background:var(--rojo)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">Ferretería Oviedo</div>
    <div class="login-sub">Catálogo Digital Clientes</div>
    <input class="login-input" id="lu" type="text" placeholder="Tu Usuario" autocomplete="off">
    <input class="login-input" id="lp" type="password" placeholder="Contraseña" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar al Catálogo</button>
    <div class="login-error" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div class="header-title">
      <h1>Ferretería Oviedo</h1>
      <p>Catálogo de Productos</p>
    </div>
    <div class="header-spacer"></div>
    <button class="btn-logout" onclick="doLogout()">Salir</button>
  </header>

  <div class="sync-bar loading" id="sbar">
    <span class="sync-dot"></span>
    <span id="stxt">Cargando catálogo...</span>
  </div>

  <div class="promos-section" id="promosSection">
    <div class="promos-title">🔥 Ofertas Destacadas</div>
    <div class="promos-container" id="promosList"></div>
  </div>

  <div class="search-section">
    <div class="search-wrap">
      <input type="text" id="sinput" placeholder="Buscar por nombre o código..." onkeyup="onSearch()">
      <span class="search-icon">🔍</span>
    </div>
    <div class="filters" id="fbar"></div>
  </div>

  <div class="productos-list" id="plist"></div>

  <button class="cart-fab" onclick="openCart()">
    🛒 <span class="cart-badge" id="cartBadge">0</span>
  </button>

  <div class="cart-panel" id="cpanel">
    <div class="cart-drawer">
      <div class="cart-handle"></div>
      <div class="cart-title">
        <span>Tu Carrito</span>
        <button class="btn-remove" onclick="closeCart()">✕</button>
      </div>
      <div id="cartList"></div>
      <div class="total-row">
        <span>Total:</span>
        <span id="cartTotal">$0</span>
      </div>
      <button class="btn-send" onclick="guardarCotizacionFirestore()">
        <span>🚀</span> Enviar Cotización
      </button>
      <button class="btn-pdf" onclick="generarPDF()">Descargar PDF</button>
      <button class="btn-vaciar" onclick="vaciarCarrito()" style="width:100%;padding:10px;background:white;color:var(--rojo);border:1px solid var(--rojo);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;">Vaciar Carrito</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var USUARIOS = [], PRODS = [], FILT = [], CART = [], PROMOS = [], MARCA = 'TODOS', currentUser = null;
const USER_KEY = 'ov_clientUser', CART_KEY = 'ov_clientCart';

function fmtCLP(n) { return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 }).format(n); }

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

// AUTH
function loadUsers() {
  apiGet({ action: 'getUsers' }, (err, users) => {
    if (!err) { USUARIOS = users.map(normalizeUserRecord); checkSession(); }
  });
}

function checkSession() {
  const stored = JSON.parse(localStorage.getItem(USER_KEY) || 'null');
  if (stored) {
    const found = USUARIOS.find(u => u.u === stored.u && u.p === stored.p);
    if (found && found.estado === 'activo') {
      currentUser = found;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      startApp(); return;
    }
  }
  document.getElementById('loginScreen').style.display = 'flex';
}

function doLogin() {
  const u = document.getElementById('lu').value.trim(), p = document.getElementById('lp').value.trim();
  const found = USUARIOS.find(x => x.u === u && x.p === p);
  if (found && found.estado === 'activo') { localStorage.setItem(USER_KEY, JSON.stringify({u:found.u, p:found.p})); checkSession(); }
  else showToast('Acceso denegado', 'err');
}

function doLogout() { localStorage.removeItem(USER_KEY); location.reload(); }

// APP
function startApp() {
  setSyncState('loading', 'Sincronizando catálogo...');
  cargarCatalogo((err, data) => {
    if (!err) {
      PRODS = data.productos.map(p => ({
        codigo: p.codigo,
        descripcion: p.descripcion,
        marca: p.marca || 'VARIOS',
        precio: p.precioiva || 0
      }));
      setSyncState('ok', '✓ Catálogo actualizado');
      initUI();
    }
  });
  if (db) {
    db.collection('promos').orderBy('ts', 'desc').onSnapshot(snap => {
      PROMOS = snap.docs.map(d => d.data());
      renderPromos();
    });
  }
}

function setSyncState(type, txt) {
  const b = document.getElementById('sbar');
  b.className = 'sync-bar ' + type;
  document.getElementById('stxt').textContent = txt;
}

function initUI() {
  FILT = PRODS.slice();
  buildFilters();
  renderProds();
  loadCart();
}

function buildFilters() {
  const marcas = ['TODOS', ...new Set(PRODS.map(p => p.marca))].sort();
  document.getElementById('fbar').innerHTML = marcas.map(m => `<button class="filter-btn${m==='TODOS'?' active':''}" onclick="setMarca('${m}')">${m}</button>`).join('');
}

function setMarca(m) {
  MARCA = m;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === m));
  onSearch();
}

function onSearch() {
  const q = document.getElementById('sinput').value.toLowerCase().trim();
  FILT = PRODS.filter(p => (MARCA === 'TODOS' || p.marca === MARCA) && (p.descripcion.toLowerCase().includes(q) || p.codigo.toLowerCase().includes(q)));
  renderProds();
}

function renderProds() {
  document.getElementById('plist').innerHTML = FILT.slice(0, 50).map(p => `
    <div class="prod-card">
      <div class="prod-header"><div class="prod-nombre">${p.descripcion}</div><div class="prod-codigo">${p.codigo}</div></div>
      <div class="prod-marca">${p.marca}</div>
      <div class="prod-bottom">
        <div class="precio-publico"><span class="precio-label">P. Público</span><span class="precio-val">${fmtCLP(p.precio)}</span></div>
        <div class="prod-actions">
          <div class="qty-wrap">
            <button class="qty-btn" onclick="chgQty('${p.codigo}', -1)">−</button>
            <span class="qty-val" id="qty_${p.codigo}">${getCartQty(p.codigo)}</span>
            <button class="qty-btn" onclick="chgQty('${p.codigo}', 1)">+</button>
          </div>
          <button class="btn-add" onclick="addToCart('${p.codigo}')">Agregar</button>
        </div>
      </div>
    </div>`).join('');
}

function renderPromos() {
  const s = document.getElementById('promosSection');
  if (!PROMOS.length) { s.style.display = 'none'; return; }
  s.style.display = 'block';
  document.getElementById('promosList').innerHTML = PROMOS.map(p => `
    <div class="promo-card">
      <div class="promo-tag">${p.tag || 'OFERTA'}</div>
      <div class="promo-name">${p.titulo}</div>
      <div class="promo-desc">${p.desc}</div>
      <div class="promo-price">${p.precio}</div>
    </div>`).join('');
}

// CARRITO
function loadCart() { try { CART = JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch(e) { CART = []; } updateCartBadge(); }
function saveCart() { localStorage.setItem(CART_KEY, JSON.stringify(CART)); updateCartBadge(); }
function updateCartBadge() { document.getElementById('cartBadge').textContent = CART.reduce((a,b)=>a+b.qty, 0); }
function getCartQty(c) { const i = CART.find(x => x.codigo === c); return i ? i.qty : 0; }

function chgQty(c, d) {
  const i = CART.find(x => x.codigo === c);
  if (i) { i.qty += d; if (i.qty <= 0) CART = CART.filter(x => x.codigo !== c); }
  else if (d > 0) { const p = PRODS.find(x => x.codigo === c); if (p) CART.push({ ...p, qty: d }); }
  saveCart(); renderProds();
}

function addToCart(c) {
  const i = CART.find(x => x.codigo === c);
  if (i) i.qty++; else { const p = PRODS.find(x => x.codigo === c); if (p) CART.push({ ...p, qty: 1 }); }
  saveCart(); renderProds(); showToast('Agregado');
}

function openCart() { document.getElementById('cpanel').style.display = 'flex'; renderCart(); }
function closeCart() { document.getElementById('cpanel').style.display = 'none'; }

function renderCart() {
  const l = document.getElementById('cartList');
  if (!CART.length) { l.innerHTML = '<div style="text-align:center;padding:20px;">Vacío</div>'; document.getElementById('cartTotal').textContent = '$0'; return; }
  l.innerHTML = CART.map(i => `
    <div class="cart-item">
      <div class="cart-item-info"><div class="cart-item-name">${i.descripcion}</div><div class="cart-item-codigo">${i.codigo}</div></div>
      <div class="cart-item-price">${fmtCLP(i.precio)}</div><div class="cart-item-qty">x${i.qty}</div>
      <button class="btn-remove" onclick="chgQty('${i.codigo}', -1)">🗑</button>
    </div>`).join('');
  document.getElementById('cartTotal').textContent = fmtCLP(CART.reduce((a,b)=>a+(b.precio*b.qty), 0));
}

function vaciarCarrito() { if(confirm('¿Vaciar?')) { CART = []; saveCart(); renderCart(); renderProds(); } }

function guardarCotizacionFirestore() {
  if (!CART.length) return;
  const c = {
    vendedor: currentUser.u,
    vendedorNombre: currentUser.nombre,
    clienteNombre: currentUser.nombre,
    items: CART.map(i => ({ codigo: i.codigo, descripcion: i.descripcion, cantidad: i.qty, precioUnitario: i.precio, precioTotal: i.precio * i.qty })),
    total: CART.reduce((a,b)=>a+(b.precio*b.qty), 0),
    estado: 'pendiente',
    ts: firebase.firestore.FieldValue.serverTimestamp()
  };
  guardarCotizacion(c, (err) => {
    if (err) showToast('Error', 'err'); else { showToast('Enviada', 'ok'); CART = []; saveCart(); closeCart(); renderProds(); }
  });
}

function generarPDF() {
  if (!CART.length) return;
  const doc = new jspdf.jsPDF();
  doc.text('Cotización - ' + currentUser.nombre, 14, 20);
  doc.autoTable(['Código', 'Descripción', 'Cant', 'Total'], CART.map(i => [i.codigo, i.descripcion, i.qty, fmtCLP(i.precio*i.qty)]), { startY: 30 });
  doc.save('cotizacion.pdf');
}

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
