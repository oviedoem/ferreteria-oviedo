<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferretería Oviedo — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --naranja:#E8450A;--naranja2:#c93a08;--naranja-light:#fff3ee;
  --gris-dark:#1a1a1a;--gris:#4a4a4a;--gris-mid:#888;--gris-light:#f5f5f5;--gris-border:#e0e0e0;
  --blanco:#fff;--verde:#2e7d32;--verde-light:#e8f5e9;--rojo:#c62828;
  --azul:#1565c0;--azul-light:#e3f2fd;
  --radius:14px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,.1);
  --font:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--gris-light);color:var(--gris-dark);min-height:100dvh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a1a 0%,#E8450A 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:white;border-radius:20px;padding:40px;width:360px;max-width:90vw;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo-img{margin:0 auto 12px;display:block}
.login-brand{font-size:22px;font-weight:800;color:var(--naranja);margin-bottom:2px;letter-spacing:-0.5px}
.login-sucursal{font-size:13px;font-weight:600;color:var(--gris-dark);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--gris-mid);margin-bottom:28px}
.login-input{width:100%;padding:14px 16px;border:2px solid var(--gris-border);border-radius:var(--radius-sm);font-size:16px;font-family:var(--font);outline:none;transition:border .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--naranja)}
.login-btn{width:100%;padding:14px;background:var(--naranja);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;font-family:var(--font)}
.login-btn:hover{background:var(--naranja2)}
.login-error{color:var(--rojo);font-size:13px;margin-top:8px;min-height:18px}
.license-info{font-size:11px;color:var(--gris-mid);margin-top:14px;padding-top:14px;border-top:1px solid var(--gris-border)}

/* HEADER */
header{background:white;border-bottom:3px solid var(--naranja);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-title h1{font-size:15px;font-weight:800;color:var(--naranja);line-height:1.1}
.header-title p{font-size:10px;color:var(--gris-mid)}
.header-spacer{flex:1}
.btn-logout{font-size:11px;color:var(--gris-mid);cursor:pointer;padding:6px 10px;border:1px solid var(--gris-border);border-radius:6px;background:white;font-family:var(--font)}

/* SYNC BAR */
.sync-bar{padding:7px 16px;font-size:11px;display:flex;align-items:center;gap:6px}
.sync-bar.ok{background:#e8f5e9;color:#2e7d32}
.sync-bar.warn{background:#fff3e0;color:#e65100}
.sync-bar.loading{background:#e3f2fd;color:#1565c0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SEARCH */
.search-section{padding:10px 14px;background:white;border-bottom:1px solid var(--gris-border)}
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{width:100%;padding:11px 16px 11px 40px;border:2px solid var(--gris-border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font);outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--naranja)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px}
.filters{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{height:0}
.filter-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--gris-border);font-size:11px;background:white;cursor:pointer;color:var(--gris);font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:all .15s}
.filter-btn.active{background:var(--naranja);border-color:var(--naranja);color:white;font-weight:600}

/* STATS */
.stats-bar{display:flex;gap:6px;padding:8px 14px;background:var(--gris-light);flex-wrap:wrap}
.stat-chip{background:white;border-radius:8px;padding:5px 10px;font-size:11px;color:var(--gris);border:1px solid var(--gris-border)}
.stat-chip span{font-weight:700;color:var(--naranja)}

/* PRODUCTOS */
.productos-list{padding:8px 14px;display:flex;flex-direction:column;gap:8px;max-width:700px;margin:0 auto;padding-bottom:90px}
.prod-card{background:white;border-radius:var(--radius);box-shadow:0 1px 5px rgba(0,0,0,.05);overflow:hidden;transition:box-shadow .15s}
.prod-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.1)}
.prod-header{padding:12px 14px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.prod-nombre{font-size:13px;font-weight:600;color:var(--gris-dark);line-height:1.35;flex:1}
.prod-codigo{font-size:10px;color:var(--gris-mid);background:var(--gris-light);padding:3px 7px;border-radius:6px;white-space:nowrap}
.prod-marca{font-size:11px;color:var(--azul);font-weight:500;padding:0 14px 6px}
.prod-bottom{padding:6px 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.precio-publico{background:var(--naranja-light);border-radius:8px;padding:8px 14px;display:flex;flex-direction:column;align-items:center}
.precio-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--naranja);margin-bottom:1px}
.precio-val{font-size:18px;font-weight:800;color:var(--naranja)}
.prod-actions{display:flex;align-items:center;gap:6px}
.qty-wrap{display:flex;align-items:center;gap:3px;background:var(--gris-light);border-radius:8px;padding:3px 6px}
.qty-btn{width:26px;height:26px;border:none;background:var(--naranja);color:white;border-radius:5px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.qty-val{width:30px;text-align:center;font-size:15px;font-weight:700}
.btn-add{padding:9px 16px;background:var(--naranja);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s;white-space:nowrap}
.btn-add:hover{background:var(--naranja2)}

/* CARRITO FAB */
.cart-fab{position:fixed;bottom:20px;right:20px;width:58px;height:58px;background:var(--naranja);color:white;border-radius:50%;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(232,69,10,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.cart-badge{position:absolute;top:-3px;right:-3px;background:var(--rojo);color:white;border-radius:50%;width:20px;height:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* PANEL CARRITO */
.cart-panel{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none}
.cart-drawer{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:20px 20px 0 0;max-height:92dvh;overflow-y:auto;padding:16px}
.cart-handle{width:36px;height:4px;background:var(--gris-border);border-radius:2px;margin:0 auto 14px}
.cart-title{font-size:19px;font-weight:800;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cart-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--gris-border)}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:600;line-height:1.3}
.cart-item-codigo{font-size:10px;color:var(--gris-mid);margin-top:1px}
.cart-item-price{font-size:14px;font-weight:700;color:var(--naranja);white-space:nowrap}
.cart-item-qty{font-size:11px;color:var(--gris-mid)}
.btn-remove{color:var(--rojo);font-size:18px;cursor:pointer;padding:4px;background:none;border:none}
.totales-box{margin:12px 0;border:1px solid var(--gris-border);border-radius:10px;overflow:hidden}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:14px}
.total-row:not(:last-child){border-bottom:1px solid var(--gris-border)}
.total-row.main{background:var(--naranja);color:white;font-size:17px;font-weight:800}
.cliente-form{margin-bottom:12px}
.form-tit{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--gris-dark)}
.form-group{margin-bottom:8px}
.form-label{font-size:11px;font-weight:600;color:var(--gris-mid);margin-bottom:3px;display:block}
.form-input{width:100%;padding:9px 11px;border:1.5px solid var(--gris-border);border-radius:8px;font-size:14px;font-family:var(--font);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--naranja)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-pdf{width:100%;padding:14px;background:var(--naranja);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .2s}
.btn-pdf:hover{background:var(--naranja2)}
.btn-vaciar{width:100%;padding:10px;background:white;color:var(--rojo);border:1px solid var(--rojo);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:7px}
.empty-state{text-align:center;padding:50px 20px;color:var(--gris-mid)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <svg class="login-logo-img" width="60" height="60" viewBox="0 0 60 60" fill="none">
      <rect width="60" height="60" rx="14" fill="#E8450A"/>
      <path d="M12 42L22 17H27L20 33H36L29 17H34L44 42H38L34 32H22L18 42H12Z" fill="white"/>
      <rect x="12" y="45" width="36" height="4" rx="2" fill="white"/>
    </svg>
    <div class="login-brand">FERRETERÍA OVIEDO</div>
    <div class="login-sucursal">Sucursal El Manzano</div>
    <div class="login-sub">Catálogo de productos y precios</div>
    <input type="text" class="login-input" id="loginUser" placeholder="Usuario" autocomplete="off">
    <input type="password" class="login-input" id="loginPass" placeholder="Contraseña" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ver precios</button>
    <div class="login-error" id="loginError"></div>
    <div class="license-info" id="licInfo">Acceso autorizado solo para clientes registrados</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">

<header>
  <svg width="38" height="38" viewBox="0 0 60 60" fill="none" style="flex-shrink:0">
    <rect width="60" height="60" rx="12" fill="#E8450A"/>
    <path d="M12 42L22 17H27L20 33H36L29 17H34L44 42H38L34 32H22L18 42H12Z" fill="white"/>
    <rect x="12" y="45" width="36" height="4" rx="2" fill="white"/>
  </svg>
  <div class="header-title">
    <h1>FERRETERÍA OVIEDO</h1>
    <p>Sucursal El Manzano</p>
  </div>
  <div class="header-spacer"></div>
  <button class="btn-logout" onclick="doLogout()">Salir</button>
</header>

<div class="sync-bar loading" id="syncBar">
  <div class="sync-dot"></div>
  <span id="syncText">Actualizando precios...</span>
</div>

<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar producto, código o marca..." oninput="onSearch()">
  </div>
  <div class="filters" id="filtersBar"></div>
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="productos-list" id="productosList"></div>

<button class="cart-fab" onclick="openCart()">
  🛒<div class="cart-badge" id="cartBadge">0</div>
</button>

<!-- CARRITO -->
<div class="cart-panel" id="cartPanel" onclick="if(event.target===this)closeCart()">
  <div class="cart-drawer">
    <div class="cart-handle"></div>
    <div class="cart-title">
      🛒 Mi Cotización
      <button style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gris-mid)" onclick="closeCart()">✕</button>
    </div>
    <div id="cartItems"></div>
    <div id="cartTotals"></div>
    <div class="cliente-form">
      <div class="form-tit">📋 Tus datos</div>
      <div class="form-group"><label class="form-label">Nombre completo / Empresa</label><input class="form-input" id="cliNombre" placeholder="Ej: Juan Pérez o Constructora SA"></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">RUT</label><input class="form-input" id="cliRut" placeholder="12.345.678-9"></div>
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-input" id="cliTel" placeholder="+56 9..."></div>
      </div>
      <div class="form-group"><label class="form-label">Dirección / Ciudad</label><input class="form-input" id="cliDir" placeholder="Calle, número, ciudad"></div>
      <div class="form-group"><label class="form-label">Observaciones</label><input class="form-input" id="cliObs" placeholder="Forma de pago, plazo entrega..."></div>
    </div>
    <button class="btn-pdf" onclick="generarPDF()">📄 Descargar cotización PDF</button>
    <button class="btn-vaciar" onclick="vaciarCarrito()">🗑 Vaciar carrito</button>
  </div>
</div>

</div><!-- end mainApp -->

<script>
const SHEETS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTfL9Q9jwmQE5P7-M7oCiWgsIRZBqYZGJnD1z23JzQ2aBLwSrzxrQ0Is8YROV_XdyBRK5IK_T_S6tb/pub?gid=111151517&single=true&output=csv';
const SHEETS_CSV_PUB = 'https://api.allorigins.win/raw?url=https%3A%2F%2Fdocs.google.com%2Fspreadsheets%2Fd%2Fe%2F2PACX-1vRTfL9Q9jwmQE5P7-M7oCiWgsIRZBqYZGJnD1z23JzQ2aBLwSrzxrQ0Is8YROV_XdyBRK5IK_T_S6tb%2Fpub%3Fgid%3D111151517%26single%3Dtrue%26output%3Dcsv';
const CACHE_KEY = 'ov_cli_productos';
const CACHE_TS_KEY = 'ov_cli_ts';

// USUARIOS CLIENTES
var USUARIOS = [
  {user:'cliente1', pass:'cli2025', nombre:'Cliente 1', licExpiry: new Date(Date.now()+30*24*60*60*1000).toISOString()},
  {user:'cliente2', pass:'cli2025', nombre:'Cliente 2', licExpiry: new Date(Date.now()+30*24*60*60*1000).toISOString()},
  {user:'demo', pass:'demo123', nombre:'Demo', licExpiry: new Date(Date.now()+30*24*60*60*1000).toISOString()},
];

var currentUser = null;
var PRODUCTOS = [];
var filtrados = [];
var carrito = [];
var marcaFiltro = 'TODOS';

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginError');
  const found = USUARIOS.find(x => x.user===u && x.pass===p);
  if (!found) { err.textContent='Usuario o contraseña incorrectos'; return; }
  if (new Date(found.licExpiry) < new Date()) { err.textContent='Acceso vencido. Contacta a Ferretería Oviedo.'; return; }
  currentUser = found;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  registerSession(currentUser.nombre,'Cliente');
  setInterval(function(){if(currentUser)registerSession(currentUser.nombre,'Cliente');},60000);
  iniciarApp();
}

function doLogout() {
  currentUser = null;
  PRODUCTOS = []; filtrados = []; carrito = [];
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

async function iniciarApp() {
  setSyncState('loading','Actualizando precios desde Ferretería Oviedo...');
  try {
    const r = await fetch(SHEETS_CSV);
    if (r.ok) {
      const txt = await r.text();
      const parsed = parseCSV(txt);
      if (parsed.length > 0) {
        PRODUCTOS = parsed;
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(parsed)); localStorage.setItem(CACHE_TS_KEY, Date.now()); } catch(e){}
        const ts = new Date().toLocaleTimeString('es-CL');
        setSyncState('ok', `✓ Precios vigentes · ${parsed.length} productos · Actualizado: ${ts}`);
        initUI(); return;
      }
    }
  } catch(e){}
  try {
    const c = localStorage.getItem(CACHE_KEY);
    if (c) {
      PRODUCTOS = JSON.parse(c);
      const ts_raw = localStorage.getItem(CACHE_TS_KEY);
      const ts = ts_raw ? new Date(parseInt(ts_raw)).toLocaleString('es-CL') : '—';
      setSyncState('warn', `Sin conexión · Precios del ${ts} · ${PRODUCTOS.length} productos`);
      initUI(); return;
    }
  } catch(e){}
  setSyncState('warn','Sin conexión. Comunícate con Ferretería Oviedo para obtener precios.');
}

function setSyncState(type, text) {
  const bar = document.getElementById('syncBar');
  bar.className = 'sync-bar ' + type;
  document.getElementById('syncText').textContent = text;
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  const idx = {};
  headers.forEach((h,i) => {
    const hl = h.toLowerCase().replace(/[^a-z]/g,'');
    if (hl.includes('codigo')) idx.Codigo=i;
    else if (hl.includes('descripcion')||hl.includes('descripción')) idx.Descripcion=i;
    else if (hl.includes('marca')) idx.Marca=i;
    else if (hl.includes('subfamilia')||hl.includes('familia')) idx.SubFamilia=i;
    else if (hl.includes('precioiva')) idx.PrecioIVA=i;
  });
  const rows=[];
  for (let i=1;i<lines.length;i++) {
    const cols=parseLine(lines[i]);
    const r={
      Codigo:(cols[idx.Codigo]||'').trim(),
      Descripcion:(cols[idx.Descripcion]||'').trim(),
      Marca:(cols[idx.Marca]||'').trim(),
      SubFamilia:(cols[idx.SubFamilia]||'').trim(),
      PrecioIVA:parseInt((cols[idx.PrecioIVA]||'0').replace(/[^0-9]/g,''))||0,
    };
    if (r.Codigo && r.PrecioIVA) rows.push(r);
  }
  return rows;
}

function parseLine(line) {
  const result=[]; let cur='', inQ=false;
  for (const ch of line) {
    if (ch==='"'){inQ=!inQ;continue}
    if (ch===','&&!inQ){result.push(cur);cur='';continue}
    cur+=ch;
  }
  result.push(cur); return result;
}

function initUI() {
  filtrados=[...PRODUCTOS];
  buildFilters();
  renderProductos();
}

function buildFilters() {
  const marcas=['TODOS',...new Set(PRODUCTOS.map(p=>p.Marca).filter(Boolean).sort())];
  document.getElementById('filtersBar').innerHTML = marcas.slice(0,22).map(m=>
    `<button class="filter-btn ${m==='TODOS'?'active':''}" onclick="setMarca('${m.replace(/'/g,"\\'")}')">${m}</button>`
  ).join('');
}

function setMarca(m) {
  marcaFiltro=m;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent===m));
  onSearch();
}

function onSearch() {
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtrados=PRODUCTOS.filter(p=>{
    const mm=marcaFiltro==='TODOS'||p.Marca===marcaFiltro;
    const mq=!q||p.Descripcion.toLowerCase().includes(q)||p.Codigo.toLowerCase().includes(q)||(p.Marca||'').toLowerCase().includes(q);
    return mm&&mq;
  });
  renderProductos();
}

function renderProductos() {
  const stats=document.getElementById('statsBar');
  stats.innerHTML=`<div class="stat-chip">Total: <span>${PRODUCTOS.length}</span></div>
    <div class="stat-chip">Filtrados: <span>${filtrados.length}</span></div>
    <div class="stat-chip">Carrito: <span>${carrito.reduce((a,c)=>a+c.qty,0)} items</span></div>`;
  const list=document.getElementById('productosList');
  if (!filtrados.length) {
    list.innerHTML='<div class="empty-state"><div style="font-size:40px">🔍</div><p style="margin-top:8px;font-size:14px">Sin resultados</p></div>';
    return;
  }
  list.innerHTML=filtrados.slice(0,80).map(p=>`
    <div class="prod-card">
      <div class="prod-header">
        <div class="prod-nombre">${p.Descripcion}</div>
        <div class="prod-codigo">${p.Codigo}</div>
      </div>
      <div class="prod-marca">${p.Marca||''}${p.SubFamilia?' · '+p.SubFamilia:''}</div>
      <div class="prod-bottom">
        <div class="precio-publico">
          <div class="precio-label">Precio IVA incl.</div>
          <div class="precio-val">${fmt(p.PrecioIVA)}</div>
        </div>
        <div class="prod-actions">
          <div class="qty-wrap">
            <button class="qty-btn" onclick="chgQty('${p.Codigo}',-1)">−</button>
            <span class="qty-val" id="qty_${p.Codigo}">1</span>
            <button class="qty-btn" onclick="chgQty('${p.Codigo}',1)">+</button>
          </div>
          <button class="btn-add" onclick="addCart('${p.Codigo}')">+ Agregar</button>
        </div>
      </div>
    </div>`).join('');
}

function fmt(n){return '$'+Math.round(n).toLocaleString('es-CL')}

function chgQty(c,d){
  const el=document.getElementById('qty_'+c);
  if(!el)return;
  let v=parseInt(el.textContent)+d;
  if(v<1)v=1;
  el.textContent=v;
}

function addCart(codigo) {
  const p=PRODUCTOS.find(x=>x.Codigo===codigo);
  if(!p)return;
  const qty=parseInt(document.getElementById('qty_'+codigo)?.textContent||1);
  const idx=carrito.findIndex(x=>x.Codigo===codigo);
  if(idx>=0) carrito[idx].qty+=qty;
  else carrito.push({...p,qty});
  updateBadge();
  toast(`✅ Agregado al carrito`,'ok');
}

function updateBadge(){document.getElementById('cartBadge').textContent=carrito.reduce((a,c)=>a+c.qty,0)}

function openCart(){renderCart();document.getElementById('cartPanel').style.display='block'}
function closeCart(){document.getElementById('cartPanel').style.display='none'}

function renderCart() {
  const items=document.getElementById('cartItems');
  const totals=document.getElementById('cartTotals');
  if(!carrito.length){
    items.innerHTML='<div class="empty-state" style="padding:24px 0"><div style="font-size:32px">🛒</div><p style="margin-top:6px;font-size:13px">Carrito vacío</p></div>';
    totals.innerHTML=''; return;
  }
  items.innerHTML=carrito.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.Descripcion}</div>
        <div class="cart-item-codigo">${item.Codigo}</div>
        <div class="cart-item-qty">${item.qty} × ${fmt(item.PrecioIVA)}</div>
      </div>
      <div class="cart-item-price">${fmt(item.PrecioIVA*item.qty)}</div>
      <button class="btn-remove" onclick="removeItem(${i})">✕</button>
    </div>`).join('');
  const subtotal=carrito.reduce((a,c)=>a+c.PrecioIVA*c.qty,0);
  const neto=Math.round(subtotal/1.19);
  const iva=subtotal-neto;
  totals.innerHTML=`<div class="totales-box">
    <div class="total-row"><span>Neto</span><span>${fmt(neto)}</span></div>
    <div class="total-row"><span>IVA 19%</span><span>${fmt(iva)}</span></div>
    <div class="total-row main"><span>TOTAL</span><span>${fmt(subtotal)}</span></div>
  </div>`;
}

function removeItem(i){carrito.splice(i,1);updateBadge();renderCart()}
function vaciarCarrito(){if(!confirm('¿Vaciar el carrito?'))return;carrito=[];updateBadge();renderCart()}

function generarPDF() {
  if(!carrito.length){toast('Agrega productos primero','warn');return}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const naranja=[232,69,10],negro=[30,30,30],gris=[100,100,100],grisClaro=[245,245,245];
  const nro=Math.floor(Math.random()*90000)+10000;
  const fecha=new Date().toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const nombre=document.getElementById('cliNombre').value||'Cliente';
  const rut=document.getElementById('cliRut').value||'';
  const dir=document.getElementById('cliDir').value||'';
  const tel=document.getElementById('cliTel').value||'';
  const obs=document.getElementById('cliObs').value||'';

  // HEADER
  doc.setFillColor(...naranja);doc.rect(0,0,216,28,'F');
  doc.setFontSize(20);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('FERRETERÍA OVIEDO',12,12);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Sucursal El Manzano',12,20);
  doc.text('Venta Cotización IVA Incluido',120,12);
  doc.setFont('helvetica','bold');doc.text(`N° ${nro}`,120,18);
  doc.setFont('helvetica','normal');doc.text('Ferretería Oviedo El Manzano',120,24);

  // FECHA
  doc.setFillColor(...grisClaro);doc.rect(0,28,216,10,'F');
  doc.setFontSize(9);doc.setTextColor(...gris);
  doc.text(fecha,12,35);doc.text('Sucursal: El Manzano',130,35);

  // CLIENTE
  let y=48;
  doc.setTextColor(...negro);doc.setFontSize(9);
  const campos=[['Señor(es):',nombre],['RUT:',rut],['Dirección:',dir],['Teléfono:',tel]];
  campos.forEach(([lbl,val])=>{
    if(!val)return;
    doc.setFont('helvetica','bold');doc.text(lbl,12,y);
    doc.setFont('helvetica','normal');doc.text(val,45,y);y+=6;
  });
  y+=4;
  doc.setFont('helvetica','italic');doc.setTextColor(...gris);
  doc.text('De acuerdo a lo solicitado, presentamos la siguiente cotización:',12,y);y+=8;

  // TABLA
  const subtotal=carrito.reduce((a,c)=>a+c.PrecioIVA*c.qty,0);
  const rows=carrito.map(item=>[
    item.Codigo,
    item.Descripcion.length>58?item.Descripcion.substring(0,58)+'...':item.Descripcion,
    item.qty,
    fmt(item.PrecioIVA),
    '0,00','0,00',
    fmt(item.PrecioIVA*item.qty)
  ]);
  doc.autoTable({
    startY:y,
    head:[['Código','Descripción','CANT','Precio','Dcto','Dcto%','Valor Total']],
    body:rows,
    foot:[[
      {content:`${carrito.reduce((a,c)=>a+c.qty,0)} unid.`,colSpan:3,styles:{halign:'right',fontStyle:'bold'}},
      {content:'Total',colSpan:3,styles:{halign:'center',fontStyle:'bold'}},
      {content:fmt(subtotal),styles:{halign:'right',fontStyle:'bold',textColor:naranja}}
    ]],
    headStyles:{fillColor:naranja,textColor:[255,255,255],fontSize:8,fontStyle:'bold',halign:'center'},
    bodyStyles:{fontSize:8,textColor:negro},
    footStyles:{fillColor:grisClaro,fontSize:8,fontStyle:'bold'},
    columnStyles:{0:{cellWidth:22},1:{cellWidth:76},2:{cellWidth:12,halign:'center'},3:{cellWidth:24,halign:'right'},4:{cellWidth:15,halign:'right'},5:{cellWidth:15,halign:'right'},6:{cellWidth:28,halign:'right'}},
    alternateRowStyles:{fillColor:[250,250,250]},
    margin:{left:12,right:12}
  });

  const yT=doc.lastAutoTable.finalY+6;
  const neto=Math.round(subtotal/1.19);
  const iva=subtotal-neto;
  doc.setFillColor(...grisClaro);doc.rect(120,yT,84,28,'F');
  doc.setFontSize(8);doc.setTextColor(...gris);doc.setFont('helvetica','normal');
  doc.text('Neto:',126,yT+8);doc.text('IVA 19%:',126,yT+15);
  doc.setTextColor(...negro);doc.setFont('helvetica','bold');
  doc.text(fmt(neto),198,yT+8,{align:'right'});doc.text(fmt(iva),198,yT+15,{align:'right'});
  doc.setFillColor(...naranja);doc.rect(120,yT+20,84,10,'F');
  doc.setFontSize(11);doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');
  doc.text('TOTAL:',126,yT+27);doc.text(fmt(subtotal),198,yT+27,{align:'right'});

  const yF=yT+34;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...negro);
  doc.text('Condiciones de Venta',12,yF);
  doc.setFont('helvetica','normal');doc.setTextColor(...gris);
  if(obs) doc.text(obs,12,yF+6);
  doc.text('Forma de Pago: TDébito + Efectivo / Transferencia',12,yF+12);
  doc.text('Esta cotización tiene validez de 7 días hábiles.',12,yF+18);
  doc.setFont('helvetica','bold');doc.setTextColor(...negro);
  doc.text('Ferretería Oviedo — Sucursal El Manzano',12,yF+28);
  doc.setFont('helvetica','normal');doc.setTextColor(...gris);
  doc.text('Página 1 de 1',198,272,{align:'right'});
  doc.save(`Cotizacion_Oviedo_${nro}.pdf`);
  toast('📄 PDF generado','ok');
}

function toast(msg,type='ok'){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:${type==='ok'?'#2e7d32':type==='warn'?'#e65100':'#c62828'};color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;font-family:var(--font);max-width:90vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3)`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

// --- SESIONES ACTIVAS ---
function registerSession(nombre,app){
  try{
    var s=JSON.parse(localStorage.getItem('ov_sessions')||'[]');
    s=s.filter(function(x){return Date.now()-x.ts<30*60*1000;});
    var ei=s.findIndex(function(x){return x.user===nombre&&x.app===app;});
    var en={user:nombre,app:app,ts:Date.now(),device:navigator.userAgent.indexOf('Mobile')>=0?'Movil':'PC'};
    if(ei>=0)s[ei]=en;else s.push(en);
    localStorage.setItem('ov_sessions',JSON.stringify(s));
  }catch(e){}
}
function clearSession(nombre,app){
  try{
    var s=JSON.parse(localStorage.getItem('ov_sessions')||'[]');
    s=s.filter(function(x){return!(x.user===nombre&&x.app===app);});
    localStorage.setItem('ov_sessions',JSON.stringify(s));
  }catch(e){}
}

</script>
