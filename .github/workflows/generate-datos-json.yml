name: generate-datos-json

on:
  push:
    branches: ["main"]
    paths:
      - "panel-admin.html"
      - "panel-cliente.html"
      - "index.html"
      - "firebase-config.js"
      - "firestore.rules"
      - "firebase.json"
      - "setup-path.ps1"
      - ".github/workflows/generate-datos-json.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate datos json
        run: |
          echo '{"status":"ok","source":"GitHub Actions"}' > datos.json

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.json
          git commit -m "chore: generate datos json" || echo "No changes"
          git push
