<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Ferretería Oviedo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
:root{
  --naranja:#E8450A;--naranja2:#c93a08;--dark:#111827;--card:#fff;
  --border:#e5e7eb;--gris:#6b7280;--verde:#059669;--rojo:#dc2626;--azul:#2563eb;--amarillo:#d97706;
}
/* LOGIN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#111827,#E8450A);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:white;border-radius:20px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-logo{width:60px;height:60px;background:var(--naranja);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white;margin:0 auto 16px;letter-spacing:-1px}
.login-title{font-size:20px;font-weight:800;color:var(--dark);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--gris);margin-bottom:24px}
.linput{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;margin-bottom:10px;outline:none;transition:.2s}
.linput:focus{border-color:var(--naranja);box-shadow:0 0 0 3px rgba(232,69,10,.1)}
.lbtn{width:100%;padding:13px;background:var(--naranja);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.lbtn:hover{background:var(--naranja2)}
.lerr{color:var(--rojo);font-size:12px;margin-top:6px;min-height:18px}

/* LAYOUT */
#app{display:none;min-height:100vh}
.topbar{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.topbar-left{display:flex;align-items:center;gap:12px}
.top-logo{width:34px;height:34px;background:var(--naranja);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:white}
.top-title{font-size:15px;font-weight:700}
.top-sub{font-size:11px;color:#9ca3af}
.top-right{display:flex;align-items:center;gap:10px}
.badge-online{background:#059669;color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.btn-logout{background:rgba(255,255,255,.1);color:white;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

/* NAV TABS */
.nav{background:white;border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;padding:14px 14px 12px;font-size:13px;font-weight:600;color:var(--gris);cursor:pointer;font-family:inherit;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.15s}
.nav-btn.active{color:var(--naranja);border-bottom-color:var(--naranja)}

/* CONTENT */
.content{padding:20px;max-width:960px;margin:0 auto}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* CARDS */
.card{background:var(--card);border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid var(--border);margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title span{font-size:18px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:white;border-radius:12px;padding:16px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-val{font-size:28px;font-weight:800;color:var(--dark)}
.stat-lbl{font-size:11px;color:var(--gris);margin-top:3px}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
.tbl td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
.tbl tr:hover td{background:#fafafa}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-verde{background:#d1fae5;color:#065f46}
.badge-rojo{background:#fee2e2;color:#991b1b}
.badge-amarillo{background:#fef3c7;color:#92400e}
.badge-azul{background:#dbeafe;color:#1e40af}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-primary{background:var(--naranja);color:white}
.btn-danger{background:#fee2e2;color:var(--rojo)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:99999;transition:.3s;opacity:0;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--verde)}
#toast.err{background:var(--rojo)}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">A</div>
    <div class="login-title">Panel Administrador V16</div>
    <div class="login-sub">Ferretería Oviedo — El Manzano</div>
    <input class="linput" id="lu" type="text" placeholder="Usuario" autocomplete="off">
    <input class="linput" id="lp" type="password" placeholder="Contraseña" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">Ingresar</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="top-logo">A</div>
      <div><div class="top-title">Panel Admin</div><div class="top-sub">Ferretería Oviedo</div></div>
    </div>
    <div class="top-right">
      <span class="badge-online" id="onlineBadge">● 0 en línea</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-tab="tab-cotizaciones">Cotizaciones</button>
    <button class="nav-btn" data-tab="tab-usuarios">Usuarios</button>
    <button class="nav-btn" data-tab="tab-promociones">Promociones</button>
    <button class="nav-btn" data-tab="tab-sesiones">Sesiones</button>
    <button class="nav-btn" data-tab="tab-config">Configuración</button>
  </div>

  <div class="content">
    <!-- TAB COTIZACIONES -->
    <div id="tab-cotizaciones" class="tab-pane active">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="statTotalCotiz">0</div><div class="stat-lbl">Total</div></div>
        <div class="stat-card"><div class="stat-val" id="statPendientes">0</div><div class="stat-lbl">Pendientes</div></div>
        <div class="stat-card"><div class="stat-val" id="statConfirmadas">0</div><div class="stat-lbl">Confirmadas</div></div>
        <div class="stat-card"><div class="stat-val" id="statCanceladas">0</div><div class="stat-lbl">Canceladas</div></div>
      </div>
      <div class="card">
        <div class="card-title"><span>📋</span> Cotizaciones en Tiempo Real</div>
        <div id="listaCotizaciones"></div>
      </div>
    </div>

    <!-- TAB USUARIOS -->
    <div id="tab-usuarios" class="tab-pane">
      <div class="card"><div class="card-title"><span>👥</span> Gestión de Usuarios</div><div id="listaUsuarios"></div></div>
      <div class="card">
        <div class="card-title"><span>➕</span> Nuevo Usuario</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <input class="linput" id="nu_u" placeholder="Usuario">
          <input class="linput" id="nu_n" placeholder="Nombre">
          <input class="linput" id="nu_p" type="password" placeholder="Password">
          <select class="linput" id="nu_r"><option value="cliente">Cliente</option><option value="vendedor">Vendedor</option><option value="admin">Admin</option></select>
        </div>
        <button class="btn btn-primary" onclick="addUser()">Crear Usuario</button>
      </div>
    </div>

    <!-- TAB PROMOCIONES -->
    <div id="tab-promociones" class="tab-pane">
      <div class="card">
        <div class="card-title"><span>📢</span> Nueva Promoción</div>
        <input class="linput" id="pr_t" placeholder="Título">
        <textarea class="linput" id="pr_d" placeholder="Descripción"></textarea>
        <input class="linput" id="pr_p" placeholder="Precio (opcional)">
        <button class="btn btn-primary" onclick="savePromo()">Publicar Promo</button>
      </div>
      <div id="listaPromos"></div>
    </div>

    <!-- TAB SESIONES -->
    <div id="tab-sesiones" class="tab-pane">
      <div class="card"><div class="card-title"><span>🟢</span> Historial de Sesiones</div><div id="listaSesiones"></div></div>
    </div>

    <!-- TAB CONFIG -->
    <div id="tab-config" class="tab-pane">
      <div class="card">
        <div class="card-title"><span>🔗</span> Configuración de Webhook</div>
        <input class="linput" id="conf_url" placeholder="URL del Catálogo">
        <button class="btn btn-primary" onclick="saveConfig()">Guardar URL</button>
        <button class="btn btn-success" onclick="testConn()">Probar Conexión</button>
        <div id="testRes" style="margin-top:10px;font-size:12px;"></div>
      </div>
    </div>
  </div>

  <!-- MODAL COTIZACION -->
  <div id="cotizModal" class="modal">
    <div class="modal-box">
      <div id="cotizDetalle"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-success" onclick="updateStatus('confirmada')">Confirmar</button>
        <button class="btn btn-danger" onclick="updateStatus('cancelada')">Cancelar</button>
        <button class="btn btn-sm" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var USUARIOS = [], COTIZACIONES = [], PROMOS = [], currentUser = null;
const USER_KEY = 'ov_adminCurrentUser';

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

function fmtCLP(n) { return new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 }).format(n); }

// AUTH
function loadUsers() {
  apiGet({ action: 'getUsers' }, (err, users) => {
    if (!err) { USUARIOS = users.map(normalizeUserRecord); checkSession(); }
  });
}

function checkSession() {
  const stored = JSON.parse(localStorage.getItem(USER_KEY) || 'null');
  if (stored) {
    const found = USUARIOS.find(u => u.u === stored.u && u.p === stored.p && u.role === 'admin');
    if (found) { currentUser = found; document.getElementById('loginScreen').style.display = 'none'; document.getElementById('app').style.display = 'block'; initApp(); return; }
  }
  document.getElementById('loginScreen').style.display = 'flex';
}

function doLogin() {
  const u = document.getElementById('lu').value.trim(), p = document.getElementById('lp').value.trim();
  const found = USUARIOS.find(x => x.u === u && x.p === p && x.role === 'admin');
  if (found) { localStorage.setItem(USER_KEY, JSON.stringify({u:found.u, p:found.p})); checkSession(); }
  else toast('Acceso denegado', 'err');
}

function doLogout() { localStorage.removeItem(USER_KEY); location.reload(); }

// APP
function initApp() {
  setupTabs();
  if (db) {
    db.collection('cotizaciones').orderBy('ts', 'desc').limit(50).onSnapshot(snap => {
      COTIZACIONES = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderCotizaciones();
    });
    db.collection('promos').orderBy('ts', 'desc').onSnapshot(snap => {
      PROMOS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPromos();
    });
    loadSessions();
  }
}

function setupTabs() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.nav-btn, .tab-pane').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    };
  });
}

// COTIZACIONES
function renderCotizaciones() {
  document.getElementById('statTotalCotiz').textContent = COTIZACIONES.length;
  document.getElementById('statPendientes').textContent = COTIZACIONES.filter(c => c.estado === 'pendiente').length;
  document.getElementById('statConfirmadas').textContent = COTIZACIONES.filter(c => c.estado === 'confirmada').length;
  document.getElementById('statCanceladas').textContent = COTIZACIONES.filter(c => c.estado === 'cancelada').length;

  document.getElementById('listaCotizaciones').innerHTML = '<table class="tbl"><thead><tr><th>Cliente</th><th>Total</th><th>Estado</th><th>Acción</th></tr></thead><tbody>' +
    COTIZACIONES.map(c => `<tr><td>${c.clienteNombre}</td><td>${fmtCLP(c.total)}</td><td><span class="badge badge-${c.estado==='confirmada'?'verde':(c.estado==='cancelada'?'rojo':'amarillo')}">${c.estado}</span></td><td><button class="btn btn-sm btn-primary" onclick="verCotiz('${c.id}')">Ver</button></td></tr>`).join('') + '</tbody></table>';
}

var currentCotId = null;
function verCotiz(id) {
  currentCotId = id;
  const c = COTIZACIONES.find(x => x.id === id);
  document.getElementById('cotizDetalle').innerHTML = `<h3>Cotización ${id.substring(0,6)}</h3><p>Cliente: ${c.clienteNombre}</p><p>Tel: ${c.clienteTelefono}</p><hr><table class="tbl">` +
    c.items.map(i => `<tr><td>${i.descripcion}</td><td>${i.cantidad}</td><td>${fmtCLP(i.precioTotal)}</td></tr>`).join('') + `</table><hr><h4>Total: ${fmtCLP(c.total)}</h4>`;
  document.getElementById('cotizModal').classList.add('open');
}

function closeModal() { document.getElementById('cotizModal').classList.remove('open'); }

function updateStatus(s) {
  db.collection('cotizaciones').doc(currentCotId).update({ estado: s }).then(() => { toast('Estado actualizado'); closeModal(); });
}

// USUARIOS
function renderUsuarios() {
  document.getElementById('listaUsuarios').innerHTML = '<table class="tbl"><thead><tr><th>User</th><th>Nombre</th><th>Rol</th><th>Acción</th></tr></thead><tbody>' +
    USUARIOS.map(u => `<tr><td>${u.u}</td><td>${u.nombre}</td><td>${u.role}</td><td><button class="btn btn-sm btn-danger" onclick="delUser('${u.u}')">Eliminar</button></td></tr>`).join('') + '</tbody></table>';
}

function addUser() {
  const d = { u: document.getElementById('nu_u').value, n: document.getElementById('nu_n').value, p: document.getElementById('nu_p').value, r: document.getElementById('nu_r').value };
  apiPost({ action: 'saveUser', data: { u: d.u, p: d.p, nombre: d.n, role: d.r, estado: 'activo' } }, () => { toast('Usuario creado'); loadUsers(); });
}

function delUser(u) { if(confirm('¿Eliminar?')) apiPost({ action: 'deleteUser', u: u }, () => { toast('Eliminado'); loadUsers(); }); }

// PROMOS
function savePromo() {
  const d = { titulo: document.getElementById('pr_t').value, desc: document.getElementById('pr_d').value, precio: document.getElementById('pr_p').value, tag: 'OFERTA' };
  apiPost({ action: 'savePromo', data: d }, () => { toast('Promo publicada'); });
}

function renderPromos() {
  document.getElementById('listaPromos').innerHTML = PROMOS.map(p => `<div class="card"><div style="display:flex;justify-content:space-between;"><strong>${p.titulo}</strong><button class="btn btn-sm btn-danger" onclick="delPromo('${p.id}')">X</button></div><p>${p.desc}</p><strong>${p.precio}</strong></div>`).join('');
}

function delPromo(id) { apiPost({ action: 'deletePromo', id: id }, () => toast('Eliminada')); }

// CONFIG & SESIONES
function loadSessions() {
  apiGet({ action: 'getSessions' }, (err, data) => {
    if (!err) {
      document.getElementById('onlineBadge').textContent = `● ${data.length} en línea`;
      document.getElementById('listaSesiones').innerHTML = '<table class="tbl"><thead><tr><th>Usuario</th><th>App</th><th>Disp</th></tr></thead><tbody>' +
        data.map(s => `<tr><td>${s.user}</td><td>${s.app}</td><td>${s.device}</td></tr>`).join('') + '</tbody></table>';
    }
  });
}

function saveConfig() {
  const url = document.getElementById('conf_url').value;
  guardarURLWebhook(url, () => toast('URL guardada'));
}

function testConn() {
  const res = document.getElementById('testRes');
  res.textContent = 'Probando...';
  probarConexionFirebase((err, data) => {
    res.textContent = err ? 'Error: ' + err.message : 'Conexión OK: ' + data.proyecto;
  });
}

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
